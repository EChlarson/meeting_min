<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <!-- PWA support -->
   <link rel="manifest" href="manifest.json">
   <meta name="theme-color" content="#007BFF">

   <!-- iPad support -->
   <meta name="apple-mobile-web-app-capable" content="yes">
   <meta name="apple-mobile-web-app-status-bar-style" content="default">
   <meta name="apple-mobile-web-app-title" content="Meeting Minutes">
   <meta name="mobile-web-app-capable" content="yes">

   <script src="https://kit.fontawesome.com/4ef24c05af.js" crossorigin="anonymous"></script>
   <link rel="stylesheet" href="./style.css">

   <title>Meeting Minutes</title>
</head>
<body>
   <section id="view-meeting" class="view active">
      <h1>Meeting Minutes</h1>

      <!-- Recording -->
      <div class="card" id="recording">
         <button class="button record" onclick="startRecording()">
            <i class="fa-solid fa-play"></i>
         </button>
         <button class="button stop" onclick="stopRecording()">
            <i class="fa-solid fa-stop"></i>
         </button>
         <div id="timer" style="font-size: 20px; margin-bottom: 12px;">00:00</div>
         <audio id="audioPlayback" controls style="margin-top: 12px; width: 100%; display: none;"></audio>
      </div>

      <!-- Transcript -->
      <div class="card">
         <h3>Meeting Info</h3>
         <input type="text" id="meetingTitle" placeholder="Meeting Title">
         <input type="date" id="meetingDate">
         <textarea id="meetingNotes" placeholder="Type meeting notes here..."></textarea>
         <textarea id="meetingMinutes" placeholder="Generated minutes will appear here..."></textarea>
      </div>

      <!-- Generated Minutes -->
      <div class="card">
         <h3>Generated Minutes</h3>

         <button class="button" onclick="generateMinutes()">
            <i class="fa-solid fa-person-running"></i>
         </button>

         <h4>Summary</h4>
         <p id="summary"></p>

         <h4>Decisions</h4>
         <ul id="decisions"></ul>

         <h4>Action Items</h4>
         <ul id="minutesActions"></ul>

         <h4>Next Steps</h4>
         <p id="nextSteps"></p>
      </div>

      <!-- Attendance -->
      <div class="card">
         <h3>Attendance</h3>
         <ul id="attendanceList" class="attendance"></ul>
      </div>

      <!-- Save -->
      <div class="card">
         <button class="button" id="saveBtn" onclick="saveMeeting()">Save Meeting</button>
         <button class="button" onclick="newMeeting()">New Meeting</button>
      </div>

      <!-- Export -->
      <div class="card">
         <h3>Export</h3>
         <div id="export-buttons">
            <button class="button" id="emailBtn">
               <i class="fa-solid fa-envelope"></i>
            </button>
            <button class="button" id="downloadBtn">
               <i class="fa-solid fa-file-arrow-down"></i>
            </button>
            <button class="button" id="copyBtn">
               <i class="fa-solid fa-copy"></i>
            </button>
         </div>
      </div>
   </section>

   <section id="view-saved" class="view">
      <div class="card">
         <h3>Saved Meetings</h3>
         <div id="savedMeetingsList">No saved meetings yet.</div>
      </div>
   </section>

   <section id="view-attendees" class="view">
      <div class="card">
         <h3>Manage Attendees</h3>

         <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <input id="newAttendeeName" type="text" placeholder="Full name" style="flex:1; min-width:180px;">
            <input id="newAttendeeEmail" type="email" placeholder="email@example.com" style="flex:1; min-width:220px;">
            <button class="button" id="addAttendeeBtn">Add</button>
         </div>

         <div id="attendeesList" style="margin-top:14px;"></div>
      </div>
   </section>

   <section id="view-tools" class="view">
      <div class="card">
         <h3>Tools</h3>
         <p>Coming soon: To-do list, templates, etc.</p>
      </div>
   </section>

   <nav class="bottom-nav">
      <button class="nav-btn active" data-target="view-meeting">
         <i class="fa-solid fa-microphone"></i>
         <span>Meeting</span>
      </button>

      <button class="nav-btn" data-target="view-saved">
         <i class="fa-solid fa-folder-open"></i>
         <span>Saved</span>
      </button>

      <button class="nav-btn" data-target="view-tools">
         <i class="fa-solid fa-list-check"></i>
         <span>Tools</span>
      </button>

      <button class="nav-btn" data-target="view-attendees">
         <i class="fa-solid fa-users"></i>
         <span>Attendees</span>
      </button>
   </nav>
   
   <script src="./record.js?v=3"></script>
   <script src="./minutes.js"></script>
   <script src="./export.js"></script>
   <script>
      if ("serviceWorker" in navigator) {
         navigator.serviceWorker.register("service-worker.js");
      }
   </script>

</body>
</html>
